# .github/workflows/fetch-prices.yml
# Fetches energy/currency prices on a schedule and commits any changes to data/

name: Fetch Prices

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour on the hour (UTC)
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the full repo history so git operations (diff, push) work correctly
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for git operations

      # Step 2: Set up Node 20, which includes native fetch() — no npm install needed for the script
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Node 20 has native fetch, no npm install needed

      # Step 3: Run the price-fetching script; writes output files into data/
      # EIA_API_KEY is stored as a repository secret and injected here as an env var
      # The script is responsible for fetching E-Control, EIA/Stooq, ECB and writing to data/
      - name: Fetch prices
        run: node scripts/fetch-prices.js
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }} # Fetches E-Control, EIA/Stooq, ECB and writes to data/

      # Step 4: Stage data/ first so both new (untracked) and modified files are visible to git diff.
      # --staged compares the index against HEAD, which correctly catches brand-new files that
      # git diff --quiet data/ (which compares working tree to index) would silently miss.
      # If nothing is staged after git add, prints a message and exits 0 — workflow never fails.
      # If something is staged, commits and pushes. GITHUB_TOKEN is automatically provided by Actions.
      - name: Commit and push data
        run: |
          git config user.email "pricebot@noreply.github.com"
          git config user.name "PriceBot"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Price update $(date -u '+%Y-%m-%d %H:%M') UTC" &&
            git push
          )
